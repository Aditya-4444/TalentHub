name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Install / Lint / Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (if present)
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests (if present)
        run: npm test --if-present
        continue-on-error: true

  deploy:
    name: Deploy to Vercel
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Install local project packages so Vite is available
      - name: Install Project Dependencies
        run: npm ci

      # FIX: Install the Vercel CLI globally so the runner recognizes the 'vercel' command
      - name: Install Vercel CLI
        run: npm install --global vercel

      # 2. Compiles the project locally on GitHub, baking the secrets into the Javascript bundle
      - name: Build Production Assets
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # 3. Pushes the pre-compiled assets directly to live hosting without interactive prompts
      - name: Push to Vercel Edge Network
        run: vercel --prod --yes --token=${{ secrets.TALENTHUBTOKEN }}
