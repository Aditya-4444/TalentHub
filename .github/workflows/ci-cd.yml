name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Install / Lint / Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (if present)
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests (if present)
        run: npm test --if-present
        continue-on-error: true

  deploy:
    name: Deploy to Vercel
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel

      # 1. Pulls down the environment variables from your Vercel Dashboard dashboard
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.TALENTHUBTOKEN }}

      # 2. Compiles your code with full access to those freshly pulled keys
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.TALENTHUBTOKEN }}

      # 3. Ships the correct asset payload out to the live server
      - name: Deploy Project to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.TALENTHUBTOKEN }}